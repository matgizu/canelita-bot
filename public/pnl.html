<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P&L — FreskaBox</title>
  <script>(function(){if(localStorage.getItem('fb-theme')==='light')document.documentElement.dataset.theme='light';})()</script>
  <link rel="stylesheet" href="/shared.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .page { flex: 1; }

    /* Drop zone */
    #pnl-drop {
      max-width: 560px; margin: 4vh auto; border: 2px dashed var(--border-hi);
      border-radius: var(--radius); padding: 56px 32px; text-align: center; cursor: pointer;
      background: var(--bg1); transition: border-color .15s, background .15s;
    }
    #pnl-drop.drag { border-color: var(--brand); background: rgba(59,130,246,.05); }
    #pnl-drop .pd-icon { font-size: 48px; margin-bottom: 12px; }
    #pnl-drop h3 { color: var(--text); font-size: 16px; margin-bottom: 8px; }
    #pnl-drop p { color: var(--text3); font-size: 13px; line-height: 1.6; }

    /* PnL content */
    .pnl-content { max-width: 1080px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    .pnl-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .pnl-grid-fit { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; }
    @media (max-width: 900px) { .pnl-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .pnl-grid { grid-template-columns: 1fr 1fr; } }

    .pnl-kpi { background: var(--bg1); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .pnl-kpi.hero { border-color: var(--success); box-shadow: 0 0 0 1px var(--success); }
    .pnl-kpi .k-lbl { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 8px; }
    .pnl-kpi .k-val { font-size: 22px; font-weight: 800; color: var(--text); }
    .pnl-kpi .k-val.green { color: #34d399; }
    .pnl-kpi .k-val.red { color: #f87171; }
    .pnl-kpi .k-sub { font-size: 11px; color: var(--text3); margin-top: 6px; }

    .pnl-section { background: var(--bg1); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .pnl-section h3 { color: var(--text); font-size: 13px; font-weight: 700; margin-bottom: 14px; }
    .pnl-line { display: flex; justify-content: space-between; padding: 8px 0; border-top: 1px solid rgba(28,48,80,.5); font-size: 13px; }
    .pnl-line:first-of-type { border-top: none; }
    .pnl-line .lbl { color: var(--text2); }
    .pnl-line .val { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
    .pnl-line.minus .val { color: #f87171; }
    .pnl-line.total { border-top: 2px solid var(--border-hi); margin-top: 4px; padding-top: 12px; }
    .pnl-line.total .lbl, .pnl-line.total .val { font-size: 15px; font-weight: 800; color: var(--text); }
    .pnl-line.total .val.green { color: #34d399; }
    .pnl-two { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 700px) { .pnl-two { grid-template-columns: 1fr; } }

    .pnl-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .pnl-table th { text-align: left; color: var(--text3); font-size: 10px; text-transform: uppercase; padding: 8px; border-bottom: 1px solid var(--border); background: var(--bg2); }
    .pnl-table td { padding: 7px 8px; color: var(--text2); border-bottom: 1px solid rgba(28,48,80,.4); }
    .pnl-table td.num, .pnl-table th.num { text-align: right; font-variant-numeric: tabular-nums; }

    .pnl-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; background: var(--bg2); color: #93c5fd; border: 1px solid var(--border); }
    .pnl-warn { background: rgba(124,45,18,.4); border: 1px solid rgba(154,52,18,.5); color: #fbbf24; border-radius: var(--radius-sm); padding: 12px 16px; font-size: 12px; }
    .pnl-note { font-size: 12px; color: var(--text3); line-height: 1.6; padding: 4px 0; }
    .pnl-loading { text-align: center; color: var(--text2); padding: 60px; font-size: 14px; }
    .pnl-scen-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    @media (max-width: 700px) { .pnl-scen-grid { grid-template-columns: 1fr; } }
    .pnl-scen { border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; background: var(--bg2); }
    .pnl-scen.pesimista { border-color: rgba(124,45,18,.6); }
    .pnl-scen.realista  { border-color: var(--success); box-shadow: 0 0 0 1px var(--success); }
    .pnl-scen.optimista { border-color: rgba(37,99,235,.5); }
    .pnl-scen .s-name { font-size: 12px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 6px; }
    .pnl-scen .s-rate { font-size: 11px; color: var(--text3); margin: 2px 0 12px; }
    .pnl-scen .s-total { font-size: 22px; font-weight: 800; color: #34d399; }
    .pnl-scen .s-total-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .4px; }
    .pnl-scen .s-line { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); padding: 3px 0; }
    .pnl-scen .s-line .v { color: var(--text2); font-variant-numeric: tabular-nums; }
    .pnl-scen .s-sep { border-top: 1px solid var(--border); margin: 8px 0; }
    .pnl-spend-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .pnl-spend-row label { font-size: 13px; color: var(--text2); }
    #pnl-spend { background: var(--bg2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 14px; width: 200px; outline: none; font-variant-numeric: tabular-nums; }
    #pnl-spend:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-glow); }
    .pnl-pos { color: #34d399; } .pnl-neg { color: #f87171; }

    .file-info { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); padding: 8px 16px; background: var(--bg1); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 20px; }
    .file-info .fi-name { flex: 1; font-weight: 500; }
  </style>
</head>
<body>

<!-- Top nav -->
<nav class="topnav">
  <a class="topnav-brand" href="/">📦 Freska<span class="brand-accent">Box</span></a>
  <div class="topnav-links">
    <a class="topnav-link" href="/catalog">🏪 Catálogo</a>
    <a class="topnav-link" href="/audit">🔍 Auditoría</a>
    <a class="topnav-link active" href="/pnl">💵 P&L</a>
    <a class="topnav-link" href="/">💬 Dashboard</a>
  </div>
  <div class="topnav-right">
    <button class="btn btn-secondary btn-sm" id="pnl-reset-btn" onclick="resetPnl()" hidden>↑ Subir otro</button>
    <button class="theme-btn" onclick="toggleTheme()">☀️</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">💵 Estado de Resultados</div>
      <div class="page-sub" id="pnl-file-name"></div>
    </div>
  </div>
  <div class="page-body">

    <!-- Drop zone -->
    <div id="pnl-drop" onclick="document.getElementById('pnl-file-input').click()">
      <div class="pd-icon">📄</div>
      <h3>Sube el export de órdenes de Dropi</h3>
      <p>Arrastra el archivo aquí o haz clic para elegirlo.<br>Formatos: Excel (.xlsx) o CSV.<br>Se excluyen automáticamente las guías CANCELADO y RECHAZADO.</p>
      <button class="btn btn-primary" style="margin-top:16px" onclick="event.stopPropagation();document.getElementById('pnl-file-input').click()">Elegir archivo</button>
      <input type="file" id="pnl-file-input" accept=".xlsx,.xls,.csv" style="display:none" onchange="onPnlFile(event)">
    </div>

    <!-- Results -->
    <div id="pnl-result"></div>

  </div>
</div>

<script>
/* ─── Helpers ─────────────────────────────────────────────────────────── */
function x(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}
function pcop(n) { return '$' + Math.round(n).toLocaleString('es-CO'); }
function attrEsc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/"/g,'&quot;')
    .replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function row(lbl, val) {
  return `<div class="irow"><span class="ilbl">${lbl}</span><span class="ival">${val || '—'}</span></div>`;
}
function rowCopy(lbl, val, copyVal) {
  const shown = val || '—';
  const toCopy = (copyVal != null ? copyVal : val) || '';
  const btn = toCopy
    ? ` <button class="copy-ic" title="Copiar" data-copy="${attrEsc(toCopy)}" onclick="copyFromBtn(this)">📋</button>`
    : '';
  return `<div class="irow"><span class="ilbl">${lbl}</span><span class="ival">${shown}</span>${btn}</div>`;
}
function bareCel(v) {
  let s = String(v || '').replace(/\D/g, '');
  if (s.length === 12 && s.startsWith('57')) s = s.slice(2);
  return s;
}
function copyFromBtn(btn) { copyText(btn.dataset.copy || '', btn); }
async function copyText(text, btn) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
    } else {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
    }
    if (btn) {
      const prev = btn.textContent;
      btn.textContent = '✓'; btn.classList.add('done');
      setTimeout(() => { btn.textContent = prev; btn.classList.remove('done'); }, 1200);
    }
  } catch { alert('No se pudo copiar'); }
}

/* ─── PnL state ───────────────────────────────────────────────────────── */
let pnlData = null;
let pnlDropReady = false;

/* ─── Reset / setup ───────────────────────────────────────────────────── */
function resetPnl() {
  document.getElementById('pnl-drop').hidden = false;
  document.getElementById('pnl-result').innerHTML = '';
  document.getElementById('pnl-file-name').textContent = '';
  document.getElementById('pnl-reset-btn').hidden = true;
  const inp = document.getElementById('pnl-file-input');
  if (inp) inp.value = '';
}

function setupPnlDrop() {
  if (pnlDropReady) return;
  pnlDropReady = true;
  const dz = document.getElementById('pnl-drop');
  ['dragenter', 'dragover'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('drag'); }));
  ['dragleave', 'drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove('drag'); }));
  dz.addEventListener('drop', e => { const f = e.dataTransfer.files[0]; if (f) uploadPnl(f); });
}

function onPnlFile(e) { const f = e.target.files[0]; if (f) uploadPnl(f); }

/* ─── Upload ──────────────────────────────────────────────────────────── */
async function uploadPnl(file) {
  document.getElementById('pnl-drop').hidden = true;
  document.getElementById('pnl-file-name').textContent = '📄 ' + file.name;
  document.getElementById('pnl-result').innerHTML = '<div class="pnl-loading">⏳ Procesando ' + x(file.name) + '…</div>';
  const form = new FormData();
  form.append('file', file, file.name);
  try {
    const res = await fetch('/api/pnl', { method: 'POST', body: form });
    const data = await res.json();
    if (!res.ok) {
      document.getElementById('pnl-result').innerHTML = '<div class="pnl-warn">⚠️ ' + x(data.error || 'No se pudo procesar') + '</div>';
      document.getElementById('pnl-reset-btn').hidden = false;
      return;
    }
    renderPnl(data);
    document.getElementById('pnl-reset-btn').hidden = false;
  } catch {
    document.getElementById('pnl-result').innerHTML = '<div class="pnl-warn">⚠️ Error de conexión al subir el archivo.</div>';
    document.getElementById('pnl-reset-btn').hidden = false;
  }
}

/* ─── Render ──────────────────────────────────────────────────────────── */
function renderPnl(d) {
  pnlData = d;
  const p = d.pnl, g = d.groups;
  const kpis = `<div class="pnl-grid">
    <div class="pnl-kpi"><div class="k-lbl">Ingresos (entregados)</div><div class="k-val green">${pcop(p.income)}</div><div class="k-sub">${g.delivered.count} pedidos entregados</div></div>
    <div class="pnl-kpi"><div class="k-lbl">Resultado neto</div><div class="k-val ${p.netResult >= 0 ? 'green' : 'red'}">${pcop(p.netResult)}</div><div class="k-sub">ganancia − devoluciones</div></div>
    <div class="pnl-kpi"><div class="k-lbl">Pendiente (en tránsito)</div><div class="k-val">${pcop(p.pendingPotential)}</div><div class="k-sub">${g.inTransit.count} pedidos en camino</div></div>
    <div class="pnl-kpi"><div class="k-lbl">Tasa de entrega</div><div class="k-val">${(p.deliveryRate*100).toFixed(1)}%</div><div class="k-sub">devolución ${(p.returnRate*100).toFixed(1)}% (${g.returned.count})</div></div>
  </div>`;

  const statement = `<div class="pnl-section">
    <h3>Estado de resultados — pedidos entregados</h3>
    <div class="pnl-line"><span class="lbl">Ingresos (recaudo COD)</span><span class="val">${pcop(p.income)}</span></div>
    <div class="pnl-line minus"><span class="lbl">(−) Costo de producto (proveedor)</span><span class="val">−${pcop(p.supplier)}</span></div>
    <div class="pnl-line minus"><span class="lbl">(−) Flete</span><span class="val">−${pcop(p.flete)}</span></div>
    <div class="pnl-line minus"><span class="lbl">(−) Comisión Dropi</span><span class="val">−${pcop(p.commission)}</span></div>
    <div class="pnl-line total"><span class="lbl">= Ganancia neta entregados</span><span class="val green">${pcop(p.netDelivered)}</span></div>
    <div class="pnl-line minus"><span class="lbl">(−) Pérdida por devoluciones (${g.returned.count})</span><span class="val">−${pcop(p.returnLoss)}</span></div>
    <div class="pnl-line total"><span class="lbl">= Resultado neto realizado</span><span class="val green">${pcop(p.netResult)}</span></div>
  </div>`;

  let projection = '';
  if (d.projection) {
    const pj = d.projection;
    const icons = { pesimista: '🔻', realista: '🎯', optimista: '🔼' };
    const cards = pj.scenarios.map(s => `
      <div class="pnl-scen ${s.key}">
        <div class="s-name">${icons[s.key] || ''} ${x(s.label)}</div>
        <div class="s-rate">${(s.rate*100).toFixed(1)}% de entrega · ${s.deliveredExpected.toFixed(1)} de ${pj.inTransitCount} en tránsito</div>
        <div class="s-total-lbl">Resultado total proyectado</div>
        <div class="s-total">${pcop(s.totalNet)}</div>
        <div class="s-sep"></div>
        <div class="s-line"><span>Neto ya realizado</span><span class="v">${pcop(d.pnl.netResult)}</span></div>
        <div class="s-line"><span>+ Ganancia de en tránsito</span><span class="v">${pcop(s.profitFromPending)}</span></div>
        <div class="s-line"><span>− Pérdida devoluciones est.</span><span class="v">−${pcop(s.returnLossExpected)}</span></div>
      </div>`).join('');
    projection = `<div class="pnl-section">
      <h3>Proyección al resolver los ${pj.inTransitCount} pedidos en tránsito</h3>
      <div style="font-size:12px;color:var(--text3);margin-bottom:14px">Utilidad esperada de esos pedidos si se entregaran todos: <b style="color:var(--text)">${pcop(pj.expectedProfitAll)}</b> — calculada <b>por pedido</b> (venta − proveedor − flete − comisión). Tasa observada: ${(pj.observedRate*100).toFixed(1)}%.</div>
      <div class="pnl-scen-grid">${cards}</div>
    </div>`;
  }

  const statusRows = d.statusBreakdown.map(s => `<tr><td>${x(s.status)}</td><td class="num">${s.count}</td></tr>`).join('');
  const counts = `<div class="pnl-section">
    <h3>Pedidos por estado de guía</h3>
    <div style="font-size:12px;color:var(--text3);margin-bottom:10px">${d.totalRows} en el archivo · <b style="color:var(--text)">${d.counted} contados</b> · ${d.excluded.total} excluidos (${d.excluded.cancelado} cancelado, ${d.excluded.rechazado} rechazado)</div>
    <table class="pnl-table"><thead><tr><th>Estado</th><th class="num">Pedidos</th></tr></thead><tbody>${statusRows}</tbody></table>
  </div>`;

  const db = d.db;
  const dbCross = `<div class="pnl-section">
    <h3>Corroboración con la base de datos</h3>
    <div class="pnl-two">
      <div>
        <div class="pnl-line"><span class="lbl">Pedidos Dropi (contados)</span><span class="val">${d.counted}</span></div>
        <div class="pnl-line"><span class="lbl">Pedidos en la DB (no cancelados)</span><span class="val">${db.orders}</span></div>
        <div class="pnl-line"><span class="lbl">Venta DB</span><span class="val">${pcop(db.revenue)}</span></div>
      </div>
      <div>
        <div class="pnl-line"><span class="lbl">✅ En ambos sistemas</span><span class="val">${db.inBoth}</span></div>
        <div class="pnl-line"><span class="lbl">🟠 Solo en Dropi</span><span class="val">${db.dropiOnly}</span></div>
        <div class="pnl-line"><span class="lbl">🔵 Solo en la DB</span><span class="val">${db.dbOnly}</span></div>
      </div>
    </div>
  </div>`;

  const listTable = (title, rows, cols) => `<div class="pnl-section">
    <h3>${title}</h3>
    <table class="pnl-table"><thead><tr>${cols}</tr></thead><tbody>${rows || '<tr><td colspan="3" style="color:var(--text3)">Ninguno</td></tr>'}</tbody></table>
  </div>`;
  const dropiOnlyRows = db.dropiOnlyList.map(o => `<tr><td>${x(o.name || '—')}</td><td>${x(o.phone)}</td><td>${x(o.status)}</td><td class="num">${pcop(o.value)}</td></tr>`).join('');
  const dbOnlyRows = db.dbOnlyList.map(o => `<tr><td>${x(o.name || '—')}</td><td>${x(o.phone)}</td><td class="num">${pcop(o.value)}</td></tr>`).join('');
  const discrepancies = `<div class="pnl-two">
    ${listTable('🟠 Solo en Dropi (no las cerró el bot)', dropiOnlyRows, '<th>Cliente</th><th>Teléfono</th><th>Estado</th><th class="num">Valor</th>')}
    ${listTable('🔵 Solo en la DB (cerradas pero sin despachar en Dropi)', dbOnlyRows, '<th>Cliente</th><th>Teléfono</th><th class="num">Valor</th>')}
  </div>`;

  const profit = `<div class="pnl-section">
    <h3>Rentabilidad con inversión en pauta</h3>
    <div class="pnl-spend-row">
      <label for="pnl-spend">💸 Gasto en pauta (COP):</label>
      <input type="number" id="pnl-spend" placeholder="0" min="0" step="1000" oninput="renderProfit()">
    </div>
    <div id="pnl-profit-out"></div>
  </div>`;

  const warns = (d.warnings && d.warnings.length) ? `<div class="pnl-warn">⚠️ ${d.warnings.map(x).join('<br>')}</div>` : '';
  const note = `<div class="pnl-note">💡 Los ingresos y la ganancia se calculan solo sobre pedidos ENTREGADOS (recaudo real). Los "en tránsito" son potenciales. La pérdida por devolución = flete de ida + flete de retorno (el producto vuelve al proveedor). La corroboración cruza por teléfono (incluye el celular alterno).</div>`;

  document.getElementById('pnl-result').innerHTML =
    `<div class="pnl-content">${warns}${kpis}${statement}${profit}${projection}<div class="pnl-two">${counts}${dbCross}</div>${discrepancies}${note}</div>`;

  const saved = localStorage.getItem('pnl_ad_spend');
  if (saved && Number(saved) > 0) document.getElementById('pnl-spend').value = saved;
  renderProfit();
}

function renderProfit() {
  const d = pnlData;
  const out = document.getElementById('pnl-profit-out');
  if (!d || !out) return;
  const spend = Number(document.getElementById('pnl-spend').value) || 0;
  localStorage.setItem('pnl_ad_spend', String(spend));
  if (spend <= 0) {
    out.innerHTML = '<div class="pnl-note">Ingresa el gasto en pauta del período para ver ROAS, costo por venta y la utilidad neta después de pauta.</div>';
    return;
  }
  const income = d.pnl.income;
  const net = d.pnl.netResult;
  const delivered = d.groups.delivered.count;
  const roas = income / spend;
  const cpa = delivered ? spend / delivered : 0;
  const afterSpend = net - spend;
  const roi = spend ? (afterSpend / spend) * 100 : 0;
  const perOrder = delivered ? afterSpend / delivered : 0;

  const kpis = `<div class="pnl-grid-fit">
    <div class="pnl-kpi hero"><div class="k-lbl">Ganancia libre por pedido</div><div class="k-val ${perOrder>=0?'green':'red'}">${pcop(perOrder)}</div><div class="k-sub">limpio tras TODO (incl. pauta) · por venta entregada</div></div>
    <div class="pnl-kpi"><div class="k-lbl">Utilidad después de pauta</div><div class="k-val ${afterSpend>=0?'green':'red'}">${pcop(afterSpend)}</div><div class="k-sub">neto realizado − pauta</div></div>
    <div class="pnl-kpi"><div class="k-lbl">ROAS realizado</div><div class="k-val ${roas>=1?'green':'red'}">${roas.toFixed(2)}x</div><div class="k-sub">recaudo ÷ pauta</div></div>
    <div class="pnl-kpi"><div class="k-lbl">Costo por venta (CPA)</div><div class="k-val">${pcop(cpa)}</div><div class="k-sub">${delivered} ventas entregadas</div></div>
    <div class="pnl-kpi"><div class="k-lbl">ROI</div><div class="k-val ${roi>=0?'green':'red'}">${roi.toFixed(0)}%</div><div class="k-sub">retorno sobre la pauta</div></div>
  </div>`;

  let proj = '';
  if (d.projection) {
    const rows = d.projection.scenarios.map(s => {
      const v = s.totalNet - spend;
      const roasP = (income + s.incomeExpected) / spend;
      const totalDelivered = delivered + s.deliveredExpected;
      const perOrderP = totalDelivered ? v / totalDelivered : 0;
      return `<tr><td>${x(s.label)}</td><td class="num">${(s.rate*100).toFixed(1)}%</td><td class="num">${roasP.toFixed(2)}x</td><td class="num ${v>=0?'pnl-pos':'pnl-neg'}">${pcop(v)}</td><td class="num ${perOrderP>=0?'pnl-pos':'pnl-neg'}">${pcop(perOrderP)}</td></tr>`;
    }).join('');
    proj = `<div style="margin-top:16px">
      <div style="font-size:12px;color:var(--text3);margin-bottom:8px">Proyección después de pauta (al resolverse los pedidos en tránsito):</div>
      <table class="pnl-table"><thead><tr><th>Escenario</th><th class="num">Entrega</th><th class="num">ROAS proy.</th><th class="num">Utilidad tras pauta</th><th class="num">Libre/pedido</th></tr></thead><tbody>${rows}</tbody></table>
    </div>`;
  }

  out.innerHTML = kpis + proj;
}

/* ─── Boot ───────────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => setupPnlDrop());
</script>
