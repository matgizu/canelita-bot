<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo — FreskaBox</title>
  <script>(function(){if(localStorage.getItem('fb-theme')==='light')document.documentElement.dataset.theme='light';})()</script>
  <link rel="stylesheet" href="/shared.css">
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .cat-layout { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar */
    .cat-sidebar {
      width: 280px; min-width: 240px; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; height: 100%; background: var(--bg1); flex-shrink: 0;
    }
    .cat-sidebar-hdr {
      padding: 16px; font-weight: 700; font-size: 13px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; color: var(--text2);
      text-transform: uppercase; letter-spacing: .5px;
    }
    .cat-prod-list { flex: 1; overflow-y: auto; padding: 8px; }
    .cat-prod-item {
      padding: 10px 12px; cursor: pointer; display: flex; align-items: center;
      gap: 10px; border-radius: 8px; margin-bottom: 2px;
      transition: background .12s; border: 1px solid transparent;
    }
    .cat-prod-item:hover { background: var(--bg2); }
    .cat-prod-item.active { background: rgba(59,130,246,.08); border-color: rgba(59,130,246,.2); }
    .cat-prod-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .cat-prod-dot.on { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,.5); }
    .cat-prod-dot.off { background: var(--text3); }
    .cat-prod-name { font-size: 13px; flex: 1; color: var(--text); }
    .cat-prod-badge {
      font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 20px;
      flex-shrink: 0;
    }
    .cat-prod-badge.on { background: rgba(34,197,94,.12); color: #86efac; border: 1px solid rgba(34,197,94,.3); }
    .cat-prod-badge.off { background: rgba(100,116,139,.12); color: #94a3b8; border: 1px solid rgba(100,116,139,.3); }
    .cat-sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }

    /* Detail */
    .cat-detail-wrap {
      flex: 1; overflow-y: auto; padding: 28px 32px;
      display: flex; flex-direction: column; gap: 24px; background: var(--bg0);
    }
    .cat-detail-hdr { display: flex; align-items: center; justify-content: space-between; }
    .cat-detail-hdr h2 { font-size: 18px; font-weight: 700; color: var(--text); }
    .cat-toggle-row { display: flex; align-items: center; gap: 10px; }
    .cat-toggle-label { font-size: 13px; color: var(--text2); }

    .cat-form-section { background: var(--bg1); border: 1px solid var(--border); border-radius: 10px; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .cat-form-section h3 { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .cat-form label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; }
    .cat-form input, .cat-form textarea {
      width: 100%; background: var(--bg2); border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 8px 10px; font-size: 13px; outline: none; font-family: inherit;
    }
    .cat-form input:focus, .cat-form textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-glow); }
    .cat-form textarea { resize: vertical; min-height: 80px; }
    .cat-actions { display: flex; gap: 10px; margin-top: 4px; }

    /* Media grid */
    .cat-media-section { background: var(--bg1); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
    .cat-media-section h3 { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 14px; }
    .cat-media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
    .cat-media-item { position: relative; border-radius: 8px; overflow: hidden; background: var(--bg2); aspect-ratio: 1; border: 1px solid var(--border); }
    .cat-media-item img, .cat-media-item video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cat-media-del {
      position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,.8);
      border: none; color: #f87171; cursor: pointer; border-radius: 50%;
      width: 24px; height: 24px; font-size: 12px; display: flex; align-items: center; justify-content: center;
    }
    .cat-media-del:hover { background: rgba(200,0,0,.9); color: #fff; }
    .cat-media-type {
      position: absolute; bottom: 6px; left: 6px; background: rgba(0,0,0,.7);
      color: #94a3b8; font-size: 10px; padding: 2px 6px; border-radius: 4px;
    }
    .cat-upload-btn {
      aspect-ratio: 1; border: 2px dashed var(--border-hi); border-radius: 8px;
      background: var(--bg2); display: flex; flex-direction: column;
      align-items: center; justify-content: center; cursor: pointer;
      color: var(--text3); font-size: 11px; gap: 6px; transition: all .2s;
    }
    .cat-upload-btn:hover { border-color: var(--brand); color: var(--text); background: var(--bg3); }
    .cat-upload-btn .cat-plus { font-size: 26px; line-height: 1; }
    .cat-empty { color: var(--text3); font-size: 14px; text-align: center; padding: 80px 0; }
  </style>
</head>
<body>

<!-- Top nav -->
<nav class="topnav">
  <a class="topnav-brand" href="/">📦 Freska<span class="brand-accent">Box</span></a>
  <div class="topnav-links">
    <a class="topnav-link active" href="/catalog">🏪 Catálogo</a>
    <a class="topnav-link" href="/audit">🔍 Auditoría</a>
    <a class="topnav-link" href="/pnl">💵 P&L</a>
    <a class="topnav-link" href="/">💬 Dashboard</a>
  </div>
  <div class="topnav-right">
    <button class="theme-btn" onclick="toggleTheme()">☀️</button>
  </div>
</nav>

<!-- Page header -->
<div style="padding: 20px 28px 0; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; border-bottom:1px solid var(--border); background:var(--bg1);">
  <div>
    <div style="font-size:18px;font-weight:700">🏪 Catálogo de Productos</div>
    <div style="font-size:12px;color:var(--text3);margin-top:2px">Gestiona productos, actívalos y sube fotos/videos</div>
  </div>
  <button class="btn btn-primary" onclick="newProduct()">+ Nuevo producto</button>
</div>

<!-- Main layout -->
<div class="cat-layout">
  <!-- Product list -->
  <aside class="cat-sidebar">
    <div class="cat-sidebar-hdr">
      <span>Productos</span>
      <span id="cat-count" style="font-size:11px;color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0">0</span>
    </div>
    <div class="cat-prod-list" id="cat-prod-list">
      <div style="color:var(--text3);font-size:12px;padding:20px;text-align:center">Cargando…</div>
    </div>
  </aside>

  <!-- Product detail -->
  <div class="cat-detail-wrap" id="cat-detail">
    <div class="cat-empty">Selecciona un producto o crea uno nuevo</div>
  </div>
</div>

<!-- Hidden file input for media uploads -->
<input type="file" id="cat-file-input" style="display:none" accept="image/*,video/*" multiple onchange="handleCatFileInput(event)">

<script>
/* ─── State ──────────────────────────────────────────────────────────── */
let catProducts = [];
let catSelectedId = null;
let catCurrentProductId = null;

/* ─── Boot ───────────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => loadCatalog());

/* ─── Helpers ─────────────────────────────────────────────────────────── */
function x(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}
function attrEsc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/"/g,'&quot;')
    .replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ─── Catalog functions ───────────────────────────────────────────────── */
async function loadCatalog() {
  const r = await fetch('/api/products');
  catProducts = await r.json();
  renderCatSidebar();
  if (catSelectedId) {
    const p = catProducts.find(pr => pr.id === catSelectedId);
    if (p) renderCatDetail(p); else renderCatEmpty();
  } else {
    renderCatEmpty();
  }
}

function renderCatSidebar() {
  const el = document.getElementById('cat-prod-list');
  const cntEl = document.getElementById('cat-count');
  if (cntEl) cntEl.textContent = catProducts.length + ' productos';
  if (!catProducts.length) {
    el.innerHTML = '<div style="color:var(--text3);font-size:12px;padding:20px;text-align:center">Sin productos aún</div>';
    return;
  }
  el.innerHTML = catProducts.map(p => `
    <div class="cat-prod-item${catSelectedId===p.id?' active':''}" onclick="selectCatProduct(${p.id})">
      <span class="cat-prod-dot ${p.isActive?'on':'off'}"></span>
      <span class="cat-prod-name">${x(p.name)}</span>
      <span class="cat-prod-badge ${p.isActive?'on':'off'}">${p.isActive?'Activo':'Inactivo'}</span>
    </div>
  `).join('');
}

function renderCatEmpty() {
  document.getElementById('cat-detail').innerHTML = '<div class="cat-empty">Selecciona un producto o crea uno nuevo</div>';
}

function selectCatProduct(id) {
  catSelectedId = id;
  renderCatSidebar();
  const p = catProducts.find(pr => pr.id === id);
  if (p) renderCatDetail(p);
}

function renderCatDetail(p) {
  const cfg = p.config || {};
  const cfgStr = typeof cfg === 'string' ? cfg : JSON.stringify(cfg, null, 2);
  const mediaHtml = (p.media || []).sort((a,b) => a.sortOrder - b.sortOrder).map(m => `
    <div class="cat-media-item" id="cat-m-${m.id}">
      ${m.type==='video'
        ? `<video src="${m.url}" muted loop playsinline></video>`
        : `<img src="${m.url}" loading="lazy" alt="">`}
      <span class="cat-media-type">${m.type==='video'?'▶ Video':'📷 Foto'}</span>
      <button class="cat-media-del" onclick="deleteCatMedia(${p.id},${m.id})" title="Eliminar">✕</button>
    </div>
  `).join('');

  document.getElementById('cat-detail').innerHTML = `
    <div class="cat-detail-hdr">
      <div>
        <h2>${x(p.name)}</h2>
        <div style="font-size:12px;color:var(--text3);margin-top:3px">ID: ${p.id} · ${(p.media||[]).length} archivos de media</div>
      </div>
      <div class="cat-toggle-row">
        <span class="cat-toggle-label" style="color:${p.isActive?'#22c55e':'var(--text3)'}">${p.isActive?'Activo':'Inactivo'}</span>
        <label class="tog" title="Activar/desactivar">
          <input type="checkbox" id="cat-active-chk" ${p.isActive?'checked':''} onchange="toggleCatProduct(${p.id},this.checked)">
          <span class="tog-slider"></span>
        </label>
      </div>
    </div>

    <div class="cat-form-section cat-form">
      <h3>Información del producto</h3>
      <div class="form-group">
        <label>Nombre del producto</label>
        <input id="cat-name" value="${attrEsc(p.name)}" placeholder="Ej: Cajones organizadores nevera">
      </div>
      <div class="form-group">
        <label>Descripción corta</label>
        <textarea id="cat-desc" placeholder="Descripción breve para el catálogo">${x(p.description||'')}</textarea>
      </div>
      <div class="form-group">
        <label>Config adicional (JSON) — precios, colores, etc.</label>
        <textarea id="cat-config" style="font-family:monospace;font-size:11px;min-height:120px">${x(cfgStr)}</textarea>
      </div>
      <div class="cat-actions">
        <button class="btn btn-primary" onclick="saveCatProduct(${p.id})">Guardar cambios</button>
        <button class="btn btn-danger" onclick="deleteCatProduct(${p.id})">Eliminar producto</button>
      </div>
    </div>

    <div class="cat-media-section">
      <h3>Fotos y videos (${p.media?p.media.length:0})</h3>
      <div class="cat-media-grid" id="cat-media-grid">
        ${mediaHtml}
        <label class="cat-upload-btn" for="cat-file-input" onclick="catCurrentProductId=${p.id}" title="Subir foto o video">
          <span class="cat-plus">+</span><span>Subir</span>
        </label>
      </div>
    </div>
  `;
}

async function handleCatFileInput(e) {
  const files = Array.from(e.target.files);
  if (!files.length || !catCurrentProductId) return;
  e.target.value = '';
  for (const file of files) {
    const fd = new FormData();
    fd.append('file', file);
    const r = await fetch(`/api/products/${catCurrentProductId}/media`, { method: 'POST', body: fd });
    if (!r.ok) { alert('Error subiendo archivo: ' + file.name); }
  }
  await loadCatalog();
  const p = catProducts.find(pr => pr.id === catCurrentProductId);
  if (p) renderCatDetail(p);
}

async function toggleCatProduct(id, active) {
  await fetch(`/api/products/${id}`, {
    method: 'PATCH', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ isActive: active })
  });
  await loadCatalog();
  const p = catProducts.find(pr => pr.id === id);
  if (p) renderCatDetail(p);
}

async function saveCatProduct(id) {
  const name = document.getElementById('cat-name').value.trim();
  if (!name) { alert('El nombre no puede estar vacío'); return; }
  const description = document.getElementById('cat-desc').value.trim();
  let config;
  try { config = JSON.parse(document.getElementById('cat-config').value || '{}'); }
  catch { alert('El JSON de config no es válido'); return; }
  const r = await fetch(`/api/products/${id}`, {
    method: 'PATCH', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name, description, config })
  });
  if (!r.ok) { alert('Error guardando'); return; }
  await loadCatalog();
  const p = catProducts.find(pr => pr.id === id);
  if (p) renderCatDetail(p);
}

async function deleteCatProduct(id) {
  if (!confirm('¿Eliminar este producto y todos sus archivos? Esta acción no se puede deshacer.')) return;
  await fetch(`/api/products/${id}`, { method: 'DELETE' });
  catSelectedId = null;
  await loadCatalog();
  renderCatEmpty();
}

async function deleteCatMedia(productId, mediaId) {
  await fetch(`/api/products/${productId}/media/${mediaId}`, { method: 'DELETE' });
  const el = document.getElementById(`cat-m-${mediaId}`);
  if (el) el.remove();
  await loadCatalog();
  const p = catProducts.find(pr => pr.id === productId);
  if (p) renderCatDetail(p);
}

async function newProduct() {
  const name = prompt('Nombre del nuevo producto:');
  if (!name || !name.trim()) return;
  const r = await fetch('/api/products', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name: name.trim() })
  });
  if (!r.ok) { alert('Error creando producto'); return; }
  const p = await r.json();
  catSelectedId = p.id;
  await loadCatalog();
  const found = catProducts.find(pr => pr.id === p.id);
  if (found) renderCatDetail(found);
}
</script>
<script>
function toggleTheme(){const h=document.documentElement,l=h.dataset.theme==='light';if(l){delete h.dataset.theme;localStorage.removeItem('fb-theme');}else{h.dataset.theme='light';localStorage.setItem('fb-theme','light');}document.querySelectorAll('.theme-btn').forEach(b=>b.textContent=document.documentElement.dataset.theme==='light'?'🌙':'☀️');}
document.querySelectorAll('.theme-btn').forEach(b=>b.textContent=document.documentElement.dataset.theme==='light'?'🌙':'☀️');
</script>
</body>
</html>
